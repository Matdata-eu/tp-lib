name: Publish to crates.io

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Update version in Cargo.toml
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          sed -i.bak "s/^version = \".*\"/version = \"$TAG_VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak

      - name: Run tests
        run: cargo test

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      
      - name: Publish tp-lib-core
        run: |
          cd tp-core
          cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        continue-on-error: false
      
      # Wait for tp-lib-core to be available on crates.io
      - name: Wait for tp-lib-core availability
        run: sleep 30
      
      - name: Publish tp-lib-cli
        run: |
          cd tp-cli
          cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        continue-on-error: true
      
      - name: Publish tp-lib-py
        run: |
          cd tp-py
          cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        continue-on-error: true
